name: Publish crate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [closed]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read crate name/version from Cargo.toml
        id: crate
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("Cargo.toml").read_text())
          pkg = data["package"]
          with open(Path.cwd() / "crate_env.txt", "w") as f:
            f.write(f"CRATE_NAME={pkg['name']}\n")
            f.write(f"CRATE_VERSION={pkg['version']}\n")
          PY
          cat crate_env.txt >> "$GITHUB_ENV"

      - name: Check if version already exists on crates.io
        id: exists
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://crates.io/api/v1/crates/${CRATE_NAME}/${CRATE_VERSION}")
          if [ "$code" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${CRATE_NAME} ${CRATE_VERSION} already exists. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cargo publish dry run
        if: steps.exists.outputs.already_published == 'false'
        run: cargo publish --dry-run

      - name: Publish to crates.io
        if: steps.exists.outputs.already_published == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
