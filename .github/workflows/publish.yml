name: Publish crate

on:
  pull_request:
    branches: [master]
    types: [closed]
  push:
    branches: [master]

jobs:
  publish:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read crate name/version from Cargo.toml
        id: crate
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("Cargo.toml").read_text())
          pkg = data["package"]
          print(f"crate_name={pkg['name']}")
          print(f"crate_version={pkg['version']}")
          PY

      - name: Check if version already exists on crates.io
        id: exists
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://crates.io/api/v1/crates/${{ steps.crate.outputs.crate_name }}/${{ steps.crate.outputs.crate_version }}")
          if [ "$code" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.crate.outputs.crate_name }} ${{ steps.crate.outputs.crate_version }} already exists. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cargo publish dry run
        if: steps.exists.outputs.already_published == 'false'
        run: cargo publish --dry-run

      - name: Publish to crates.io
        if: steps.exists.outputs.already_published == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
